<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strands AI | Ops Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: rgba(17, 24, 39, 0.7);
            --neon-blue: #00d2ff;
            --neon-green: #00ff87;
            --neon-red: #ff0055;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg-color);
            color: #e5e7eb;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 135, 0.05) 0%, transparent 40%);
        }
        .header-font { font-family: 'Orbitron', sans-serif; }
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .status-pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }
        .glow-blue { box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        .glow-green { box-shadow: 0 0 15px rgba(0, 255, 135, 0.4); }
        .glow-red { box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); }
        
        .loading-bar {
            height: 2px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            width: 0%;
            transition: width 0.5s ease-in-out;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="loading-bar" id="progressBar"></div>

    <header class="flex flex-col md:flex-row items-center justify-between mb-12 max-w-7xl mx-auto bg-transparent">
        <div class="flex items-center gap-4 mb-4 md:mb-0">
            <div class="w-12 h-12 bg-gradient-to-br from-cyan-500 to-emerald-400 rounded-xl flex items-center justify-center glow-blue">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <div>
                <h1 class="header-font text-2xl font-bold tracking-widest text-white">STRANDS AI</h1>
                <p class="text-xs text-cyan-400 tracking-tighter uppercase">Operations Console v3.1</p>
            </div>
        </div>
        <div class="glass px-6 py-2 rounded-full flex items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-emerald-400 status-pulse"></div>
                <span class="text-sm font-semibold text-emerald-400 uppercase tracking-widest" id="globalStatusDisplay">SYSTEM OPERATIONAL</span>
            </div>
            <div class="h-4 w-px bg-gray-700"></div>
            <button onclick="refreshData()" class="hover:text-cyan-400 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <!-- Stats Summary -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="glass p-6 rounded-2xl border-l-4 border-cyan-400">
                <p class="text-gray-400 text-sm uppercase mb-1">Active Tools</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-3xl font-bold header-font" id="toolCount">11</span>
                    <span class="text-cyan-400 text-xs">ONLINE</span>
                </div>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-emerald-400">
                <p class="text-gray-400 text-sm uppercase mb-1">Avg Latency</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-3xl font-bold header-font" id="avgLatency">145</span>
                    <span class="text-emerald-400 text-xs">MS</span>
                </div>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-purple-400">
                <p class="text-gray-400 text-sm uppercase mb-1">System Load</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-3xl font-bold header-font">0.05</span>
                    <span class="text-purple-400 text-xs">LOW</span>
                </div>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-orange-400">
                <p class="text-gray-400 text-sm uppercase mb-1">Last Update</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-xl font-bold header-font" id="lastUpdateTime">NOW</span>
                </div>
            </div>
        </div>

        <!-- Node Grid -->
        <h2 class="header-font text-lg font-semibold mb-6 tracking-wider flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            DISTRIBUTED MCP NODES
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="nodesContainer">
             <!-- Node cards injected here -->
             <div class="animate-pulse col-span-full py-20 text-center text-gray-500 italic">Connecting to Status Hub Orchestrator...</div>
        </div>
    </main>

    <footer class="mt-20 text-center text-gray-600 text-xs uppercase tracking-widest pb-8">
        Strands Advanced Agentic Platform &copy; 2026 | Powered by AWS Bedrock & AgentCore
    </footer>

    <script>
        // REPLACE WITH YOUR ACTUAL AWS CLOUD URL OR API GATEWAY ENDPOINT
        const API_URL = "http://localhost:3000/status"; 

        async function fetchHealthData() {
            try {
                const start = Date.now();
                document.getElementById('progressBar').style.width = '30%';
                
                // MOCK RESPONSE FOR OFFLINE DEVELOPMENT (REPLACE WITH REAL FETCH)
                if (API_URL.includes("localhost")) {
                    await new Promise(r => setTimeout(r, 800)); // Simulate delay
                    return {
                        timestamp: new Date().toISOString(),
                        systemStatus: "OPERATIONAL",
                        nodes: [
                            { name: "checkWebDatabase", status: "HEALTHY", latencyMs: 120, url: "..." },
                            { name: "checkInventory", status: "HEALTHY", latencyMs: 85, url: "..." },
                            { name: "checkPricing", status: "HEALTHY", latencyMs: 140, url: "..." },
                            { name: "checkPimService", status: "HEALTHY", latencyMs: 210, url: "..." },
                            { name: "checkDeadLetterQueue", status: "HEALTHY", latencyMs: 95, url: "..." },
                            { name: "queryGuide", status: "HEALTHY", latencyMs: 310, url: "..." },
                            { name: "triggerAutoSync", status: "HEALTHY", latencyMs: 110, url: "..." },
                            { name: "verifyWebState", status: "HEALTHY", latencyMs: 105, url: "..." },
                            { name: "listMemories", status: "HEALTHY", latencyMs: 45, url: "..." },
                            { name: "deleteMemory", status: "HEALTHY", latencyMs: 40, url: "..." },
                            { name: "mcpL2Detective", status: "HEALTHY", latencyMs: 280, url: "..." }
                        ]
                    };
                }

                const response = await fetch(API_URL);
                document.getElementById('progressBar').style.width = '70%';
                const data = await response.json();
                return data;
            } catch (err) {
                console.error("Health check failed", err);
                return null;
            } finally {
                document.getElementById('progressBar').style.width = '100%';
                setTimeout(() => document.getElementById('progressBar').style.width = '0%', 1000);
            }
        }

        async function refreshData() {
            const data = await fetchHealthData();
            if (!data) return;

            const container = document.getElementById('nodesContainer');
            container.innerHTML = '';

            let totalLatency = 0;
            data.nodes.forEach(node => {
                totalLatency += node.latencyMs;
                const statusColor = node.status === 'HEALTHY' ? 'emerald' : node.status === 'DOWN' ? 'red' : 'orange';
                const glowClass = node.status === 'HEALTHY' ? 'glow-green' : node.status === 'DOWN' ? 'glow-red' : 'glow-orange';
                
                const card = `
                    <div class="glass p-6 rounded-2xl relative overflow-hidden group hover:scale-[1.02] transition-transform duration-300">
                        <div class="absolute top-0 right-0 w-24 h-24 bg-${statusColor}-400/5 rounded-bl-full -mr-12 -mt-12 transition-all group-hover:bg-${statusColor}-400/10"></div>
                        <div class="flex items-start justify-between mb-4">
                            <div class="w-10 h-10 rounded-lg bg-gray-800 flex items-center justify-center border border-gray-700">
                                <span class="text-xs font-bold text-gray-500">${node.name.substring(0, 2).toUpperCase()}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] header-font text-${statusColor}-400">${node.status}</span>
                                <div class="w-2 h-2 rounded-full bg-${statusColor}-400 ${node.status === 'HEALTHY' ? 'status-pulse' : ''} ${glowClass}"></div>
                            </div>
                        </div>
                        <h3 class="text-white font-semibold text-sm truncate mb-1" title="${node.name}">${node.name}</h3>
                        <p class="text-gray-500 text-[10px] font-mono break-all mb-4">MCP.V1 - OK</p>
                        <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-800/50">
                            <span class="text-[10px] text-gray-400 uppercase tracking-widest">Latency</span>
                            <span class="text-xs font-bold text-${node.latencyMs > 200 ? 'orange' : 'emerald'}-400">${node.latencyMs}ms</span>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });

            // Update stats
            document.getElementById('avgLatency').innerText = Math.round(totalLatency / data.nodes.length);
            document.getElementById('toolCount').innerText = data.nodes.length;
            document.getElementById('globalStatusDisplay').innerText = data.systemStatus === 'OPERATIONAL' ? 'SYSTEM OPERATIONAL' : 'SYSTEM DEGRADED';
            document.getElementById('lastUpdateTime').innerText = new Date().toLocaleTimeString();
        }

        // Initial Load
        refreshData();
        // Auto-refresh every 30 seconds
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
